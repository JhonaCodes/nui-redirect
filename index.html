<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening NUI App...</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 40px 32px;
        max-width: 360px;
        width: 100%;
        text-align: center;
        box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      }
      .icon { font-size: 48px; margin-bottom: 16px; }
      .title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 8px; }
      .subtitle { font-size: 14px; color: #666; line-height: 1.5; }
      .error { color: #d32f2f; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" id="icon">⏳</div>
      <div class="title" id="title">Opening NUI App...</div>
      <div class="subtitle" id="subtitle">You will be redirected automatically.</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
